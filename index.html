<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Входное тестирование | Английский язык для школьников</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', 'Roboto', sans-serif;
        }
        body {
            background: #f0f7ff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            max-width: 1100px;
            width: 100%;
            background: white;
            border-radius: 32px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .screen {
            padding: 30px 35px 40px;
        }
        h1, h2 {
            color: #1e2f5e;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            font-weight: 600;
            display: block;
            margin-bottom: 8px;
            color: #2c3e66;
        }
        input, select {
            width: 100%;
            padding: 12px 16px;
            font-size: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 20px;
        }
        input:focus, select:focus {
            border-color: #4f7df3;
            outline: none;
            box-shadow: 0 0 0 3px rgba(79,125,243,0.2);
        }
        button {
            background: #4f7df3;
            color: white;
            border: none;
            padding: 12px 28px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 40px;
            cursor: pointer;
            margin-top: 10px;
        }
        button:hover {
            background: #2a5be0;
        }
        .question {
            background: #f9fafc;
            margin-bottom: 25px;
            padding: 18px 20px;
            border-radius: 24px;
            border-left: 6px solid #4f7df3;
        }
        .question-text {
            font-weight: 600;
            margin-bottom: 12px;
        }
        .options {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #dce3ec;
        }
        .result-card {
            background: #e9f0fe;
            border-radius: 28px;
            padding: 20px;
            margin-top: 20px;
        }
        .badge {
            display: inline-block;
            background: #1e2f5e;
            color: white;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 0.85rem;
            margin-bottom: 15px;
        }
        .warning {
            background: #fff3e0;
            border-left: 5px solid #f5a623;
            padding: 12px;
            border-radius: 16px;
            margin: 15px 0;
        }
        .success-list {
            background: #e0f2e9;
            padding: 12px;
            border-radius: 16px;
            margin: 15px 0;
        }
        .category-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 10px;
        }
        .cat-card {
            background: #f1f5f9;
            border-radius: 20px;
            padding: 12px;
        }
        .cat-card h4 {
            margin: 0 0 10px 0;
            color: #1e2f5e;
        }
        .cat-checkboxes {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .cat-checkboxes label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            background: white;
            padding: 4px 12px;
            border-radius: 30px;
            font-weight: normal;
            font-size: 0.9rem;
        }
        @media (max-width: 650px) {
            .screen { padding: 20px; }
            .options { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="container" id="app">
    <div id="entryScreen" class="screen">
        <h1>🎓 Определение уровня английского</h1>
        <div class="form-group">
            <label>Имя и фамилия</label>
            <input type="text" id="userName" placeholder="Иван Петров">
        </div>
        <div class="form-group">
            <label>Ваш возраст</label>
            <input type="number" id="userAge" placeholder="Например: 12" min="7" max="17">
        </div>
        <button id="startBtn">Начать тест →</button>
        <div class="warning" style="margin-top: 25px;">
            📌 Открытые задания пропущены – они оцениваются преподавателем отдельно.
        </div>
    </div>

    <div id="testScreen" class="screen" style="display: none;">
        <h2 id="testTitle"></h2>
        <div id="questionsContainer"></div>
        <button id="submitTestBtn">✅ Завершить тест</button>
    </div>

    <div id="resultScreen" class="screen" style="display: none;">
        <h2>📊 Ваш результат</h2>
        <div id="resultContent"></div>
        <button id="restartBtn">◀ Пройти заново</button>
    </div>
</div>

    // ---------- ФУНКЦИИ ОПРЕДЕЛЕНИЯ ВОЗРАСТА ----------
    function getTestByAge(age) {
        if (age >= 7 && age <= 12) return childrenTest;
        if (age >= 13 && age <= 17) return teenTest;
        return null;
    }

    // ---------- ОЦЕНКА ДЕТСКОГО ТЕСТА (с чекбоксами) ----------
   function evaluateChildrenTest(answers, questions) {
        let totalScore = 0;
        let maxScore = 0;
        const topicScores = {}; // { topicName: { correct: number, max: number } }
        
        for (let i = 0; i < questions.length; i++) {
            const q = questions[i];
            maxScore += q.points;
            let isCorrectOverall = false;
            
            if (q.type === "grouping_checkboxes") {
                // Оцениваем каждую категорию отдельно
                const userGrouping = answers[i];
                if (userGrouping && typeof userGrouping === 'object') {
                    const vocabTopics = q.vocabTopics;
                    let allCatsCorrect = true;
                    for (let cat in q.correctMapping) {
                        const userWords = userGrouping[cat] || [];
                        const correctWords = q.correctMapping[cat];
                        const catCorrect = (userWords.length === correctWords.length && userWords.every(w => correctWords.includes(w)));
                        const topicName = vocabTopics[cat];
                        if (topicName) {
                            if (!topicScores[topicName]) topicScores[topicName] = { correct: 0, max: 0 };
                            topicScores[topicName].max += 1;
                            if (catCorrect) topicScores[topicName].correct += 1;
                        }
                        if (!catCorrect) allCatsCorrect = false;
                    }
                    if (allCatsCorrect) {
                        totalScore += q.points;
                        isCorrectOverall = true;
                    }
                }
            } 
            else if (q.options) {
                const userAnswer = answers[i];
                const isCorrect = (userAnswer === q.correct);
                if (isCorrect) totalScore += q.points;
                const topic = q.topic;
                if (topic) {
                    if (!topicScores[topic]) topicScores[topic] = { correct: 0, max: 0 };
                    topicScores[topic].max += q.points;
                    if (isCorrect) topicScores[topic].correct += q.points;
                }
            }
            else if (q.type === "short") {
                const userAnswer = (answers[i] || "").toLowerCase().trim();
                const variants = q.variants || [q.correct.toLowerCase()];
                const isCorrect = variants.some(v => userAnswer === v.toLowerCase());
                if (isCorrect) totalScore += q.points;
                const topic = q.topic;
                if (topic) {
                    if (!topicScores[topic]) topicScores[topic] = { correct: 0, max: 0 };
                    topicScores[topic].max += q.points;
                    if (isCorrect) topicScores[topic].correct += q.points;
                }
            }
        }
        
        return { totalScore, maxScore, topicScores };
    }

    // Определение уровня для детей на основе процентов по темам
    function getChildrenLevelFromTopics(topicScores) {
        // Функция для вычисления процента по группе тем
        function getAvgPercent(topicsList) {
            let totalCorrect = 0, totalMax = 0;
            for (let t of topicsList) {
                if (topicScores[t]) {
                    totalCorrect += topicScores[t].correct;
                    totalMax += topicScores[t].max;
                }
            }
            if (totalMax === 0) return 0;
            return (totalCorrect / totalMax) * 100;
        }
        
        // Темы для уровня Children 1
        const topicsLevel1Vocab = ["food", "colours", "transport", "body_parts", "weather", "rooms", "clothes", "time"];
        const topicsLevel1Grammar = ["to_be", "have_has", "can"];
        const percentVocab1 = getAvgPercent(topicsLevel1Vocab);
        const percentGrammar1 = getAvgPercent(topicsLevel1Grammar);
        const level1Strong = (percentVocab1 >= 70 && percentGrammar1 >= 70);
        
        // Темы для уровня Children 2
        const topicsLevel2Vocab = ["body_parts", "time", "clothes"]; // части тела, время суток, одежда (action verbs нет отдельных вопросов, но есть present continuous)
        const topicsLevel2Grammar = ["present_simple", "present_simple_neg", "present_continuous"];
        const percentVocab2 = getAvgPercent(topicsLevel2Vocab);
        const percentGrammar2 = getAvgPercent(topicsLevel2Grammar);
        const level2Strong = (percentVocab2 >= 70 && percentGrammar2 >= 70);
        
        // Темы для уровня Children 3
        const topicsLevel3Vocab = []; // school subjects, school items, feelings – в детском тесте нет, поэтому не проверяем
        const topicsLevel3Grammar = ["past_simple"];
        const percentGrammar3 = getAvgPercent(topicsLevel3Grammar);
        const level3Strong = (percentGrammar3 >= 70);
        
        // Логика: если уровень 1 не пройден → Children 1
        if (!level1Strong) {
            return { level: "Children 1 (English World 1)", umk: "English World 1", nextLevel: "English World 2", weakTopics: [], strongTopics: [] };
        }
        // Если уровень 1 пройден, но уровень 2 не пройден → Children 2
        if (level1Strong && !level2Strong) {
            return { level: "Children 2 (English World 2)", umk: "English World 2", nextLevel: "English World 3", weakTopics: [], strongTopics: [] };
        }
        // Если уровень 1 и 2 пройдены, но уровень 3 не пройден → Children 3
        if (level1Strong && level2Strong && !level3Strong) {
            return { level: "Children 3 (English World 3)", umk: "English World 3", nextLevel: "Discover English 1", weakTopics: [], strongTopics: [] };
        }
        // Если всё пройдено → Discover English
        return { level: "Discover English 1/2", umk: "Discover English 1 или 2", nextLevel: "Solutions Elementary", weakTopics: [], strongTopics: [] };
    }

    // Формирование списков сильных и слабых сторон для детей
    function getChildrenStrengthsWeaknesses(topicScores) {
        const strengths = [];
        const weaknesses = [];
        
        const vocabTopics = ["food", "colours", "transport", "body_parts", "weather", "rooms", "clothes", "time"];
        const grammarTopics = ["to_be", "have_has", "can", "present_simple", "present_simple_neg", "present_continuous", "past_simple"];
        
        for (let topic of vocabTopics) {
            if (topicScores[topic]) {
                const percent = (topicScores[topic].correct / topicScores[topic].max) * 100;
                if (percent >= 70) strengths.push(`Лексика: ${topic}`);
                else weaknesses.push(`Лексика: ${topic}`);
            }
        }
        for (let topic of grammarTopics) {
            if (topicScores[topic]) {
                const percent = (topicScores[topic].correct / topicScores[topic].max) * 100;
                if (percent >= 70) strengths.push(`Грамматика: ${topic}`);
                else weaknesses.push(`Грамматика: ${topic}`);
            }
        }
        if (strengths.length === 0) strengths.push("Нет明显的 сильных сторон");
        if (weaknesses.length === 0) weaknesses.push("Отлично! Все темы усвоены.");
        return { strengths, weaknesses };
    }

    // ---------- ОЦЕНКА ПОДРОСТКОВОГО ТЕСТА (с чекбоксами) ----------
    function evaluateTeenTest(answers, questions) {
        let totalScore = 0;
        let maxScore = 0;
        const topicScores = {};
        for (let i = 0; i < questions.length; i++) {
            const q = questions[i];
            maxScore += q.points;
            let isCorrect = false;
            let userAnswer = answers[i];
            if (q.type === "grouping_checkboxes") {
                if (userAnswer && typeof userAnswer === 'object') {
                    let correctCats = 0;
                    for (let cat in q.correctMapping) {
                        const userWords = userAnswer[cat] || [];
                        const correctWords = q.correctMapping[cat];
                        if (userWords.length === correctWords.length && userWords.every(w => correctWords.includes(w))) correctCats++;
                    }
                    isCorrect = (correctCats === Object.keys(q.correctMapping).length);
                    if (isCorrect) totalScore += q.points;
                }
            } else if (q.options) {
                if (userAnswer === q.correct) isCorrect = true;
            } else if (q.type === "short") {
                const ans = (userAnswer || "").toLowerCase().trim();
                const variants = q.variants || [q.correct.toLowerCase()];
                if (variants.some(v => ans === v.toLowerCase())) isCorrect = true;
            }
            if (isCorrect) totalScore += q.points;
            const topic = q.topic || "general";
            if (!topicScores[topic]) topicScores[topic] = { correct: 0, max: 0 };
            topicScores[topic].max += q.points;
            if (isCorrect) topicScores[topic].correct += q.points;
        }
        return { totalScore, maxScore, topicScores };
    }

    // Исправленная функция определения уровня для подростков
function getTeenLevelFromTopics(topicScores, totalScore, maxScore) {
    // Определяем, какие темы усвоены хорошо (>=70% правильных ответов)
    const strongTopics = new Set();
    const weakTopics = [];
    
    for (let [topic, data] of Object.entries(topicScores)) {
        const percent = (data.correct / data.max) * 100;
        if (percent >= 70) {
            strongTopics.add(topic);
        } else {
            weakTopics.push(topic);
        }
    }
    
    // Проверяем, усвоены ли ключевые темы
    const hasPastSimple = strongTopics.has("past_simple") || strongTopics.has("past_simple_neg");
    const hasPresentPerfect = strongTopics.has("present_perfect");
    const hasPastContinuous = strongTopics.has("past_continuous");
    const hasConditionals = strongTopics.has("conditionals1");
    const hasReported = strongTopics.has("reported_speech");
    const hasPassive = strongTopics.has("passive") && strongTopics.has("passive_neg");
    const hasGerund = strongTopics.has("gerund");
    const hasComplex = strongTopics.has("complex_object");
    
    // Базовая грамматика (Present Simple, Past Simple) – если они слабые, уровень не может быть выше Students-2
    const hasBasicGrammar = strongTopics.has("present_simple") && hasPastSimple;
    
    // Логика определения уровня (снизу вверх)
    if (hasReported && hasPassive && hasGerund && hasComplex && hasBasicGrammar && hasPresentPerfect && hasPastContinuous && hasConditionals) {
        return { 
            level: "Students-5/6 (Intermediate)", 
            umk: "Solutions Intermediate", 
            nextLevel: "Upper-Intermediate", 
            weakTopics, 
            strongTopics: Array.from(strongTopics) 
        };
    }
    
    if (hasConditionals && hasBasicGrammar && hasPresentPerfect && hasPastContinuous) {
        return { 
            level: "Students-4 (Pre-Intermediate 2nd half)", 
            umk: "Solutions Pre-Intermediate (поздняя часть)", 
            nextLevel: "Intermediate", 
            weakTopics, 
            strongTopics: Array.from(strongTopics) 
        };
    }
    
    if (hasPresentPerfect && hasPastContinuous && hasBasicGrammar) {
        return { 
            level: "Students-3 (Pre-Intermediate начало)", 
            umk: "Solutions Pre-Intermediate (ранняя часть)", 
            nextLevel: "Students-4", 
            weakTopics, 
            strongTopics: Array.from(strongTopics) 
        };
    }
    
    if (hasPastSimple && strongTopics.has("present_simple")) {
        return { 
            level: "Students-2 (Elementary+)", 
            umk: "Solutions Elementary (продвинутый этап)", 
            nextLevel: "Pre-Intermediate", 
            weakTopics, 
            strongTopics: Array.from(strongTopics) 
        };
    }
    
    // Если процент правильных ответов очень низкий (<40%) – дополнительно снижаем уровень
    const totalPercent = (totalScore / maxScore) * 100;
    if (totalPercent < 40) {
        return { 
            level: "Students-1 (Elementary – начальный)", 
            umk: "Solutions Elementary (начало)", 
            nextLevel: "Elementary+", 
            weakTopics, 
            strongTopics: Array.from(strongTopics) 
        };
    }
    
    return { 
        level: "Students-1 (Elementary)", 
        umk: "Solutions Elementary", 
        nextLevel: "Elementary+", 
        weakTopics, 
        strongTopics: Array.from(strongTopics) 
    };
}

    // Функция для получения уровня детей
    function getChildrenLevelFromScore(score, maxScore) {
        const percent = (score/maxScore)*100;
        if (percent >= 90) return { level: "Discover English 1/2", umk: "Discover English 1/2", nextLevel: "Solutions Elementary" };
        if (percent >= 70) return { level: "Children 3", umk: "English World 3", nextLevel: "Discover English" };
        if (percent >= 45) return { level: "Children 2", umk: "English World 2", nextLevel: "English World 3" };
        return { level: "Children 1", umk: "English World 1", nextLevel: "English World 2" };
    }

    // Глобальные переменные
    let currentTest = null;
    let userAge = null;
    let userName = "";

    // ---------- РЕНДЕР ТЕСТА (с чекбоксами для группировки) ----------
    function renderTest() {
        const container = document.getElementById("questionsContainer");
        container.innerHTML = "";
        if (currentTest.instructions) {
            const instrDiv = document.createElement("div");
            instrDiv.className = "question";
            instrDiv.style.background = "#eef2ff";
            instrDiv.innerHTML = `<strong>📌 Инструкции к заданиям:</strong><br>${currentTest.instructions.map(i => `• ${i}`).join('<br>')}`;
            container.appendChild(instrDiv);
        }
        currentTest.questions.forEach((q, idx) => {
            const div = document.createElement("div");
            div.className = "question";
            if (q.instruction) {
                const instrHeader = document.createElement("div");
                instrHeader.style.fontWeight = "bold";
                instrHeader.style.marginBottom = "10px";
                instrHeader.style.color = "#4f7df3";
                instrHeader.innerText = `Задание ${q.instruction}`;
                div.appendChild(instrHeader);
            }
            if (q.type === "grouping_checkboxes") {
                div.innerHTML = `<div class="question-text">${idx+1}. ${q.text}</div>`;
                const grid = document.createElement("div");
                grid.className = "category-grid";
                q.categories.forEach(cat => {
                    const catCard = document.createElement("div");
                    catCard.className = "cat-card";
                    catCard.innerHTML = `<h4>${cat}</h4><div class="cat-checkboxes" data-category="${cat}"></div>`;
                    const checkboxesDiv = catCard.querySelector(".cat-checkboxes");
                    q.words.forEach(word => {
                        const label = document.createElement("label");
                        const cb = document.createElement("input");
                        cb.type = "checkbox";
                        cb.value = word;
                        cb.name = `group_${idx}_${cat}`;
                        label.appendChild(cb);
                        label.appendChild(document.createTextNode(word));
                        checkboxesDiv.appendChild(label);
                    });
                    grid.appendChild(catCard);
                });
                div.appendChild(grid);
            } else if (q.options) {
                div.innerHTML = `<div class="question-text">${idx+1}. ${q.text}</div>`;
                const optsDiv = document.createElement("div");
                optsDiv.className = "options";
                q.options.forEach(opt => {
                    const label = document.createElement("label");
                    label.className = "option";
                    const radio = document.createElement("input");
                    radio.type = "radio";
                    radio.name = `q${idx}`;
                    radio.value = opt;
                    label.appendChild(radio);
                    label.appendChild(document.createTextNode(opt));
                    optsDiv.appendChild(label);
                });
                div.appendChild(optsDiv);
            } else {
                div.innerHTML = `<div class="question-text">${idx+1}. ${q.text}</div><input type="text" data-qidx="${idx}" style="width:100%; padding:8px; margin-top:8px;">`;
            }
            container.appendChild(div);
        });
        document.getElementById("testTitle").innerText = currentTest.name;
        document.getElementById("testScreen").style.display = "block";
        document.getElementById("entryScreen").style.display = "none";
        document.getElementById("resultScreen").style.display = "none";
    }

    function collectAnswers() {
        const answers = [];
        const questions = currentTest.questions;
        for (let i = 0; i < questions.length; i++) {
            const q = questions[i];
            if (q.type === "grouping_checkboxes") {
                const questionDiv = document.querySelectorAll(".question")[currentTest.instructions ? i+1 : i];
                const result = {};
                q.categories.forEach(cat => {
                    const checkboxes = questionDiv.querySelectorAll(`input[name^="group_${i}_${cat}"]:checked`);
                    result[cat] = Array.from(checkboxes).map(cb => cb.value);
                });
                answers.push(result);
            } else if (q.options) {
                const radio = document.querySelector(`input[name="q${i}"]:checked`);
                answers.push(radio ? radio.value : null);
            } else {
                const input = document.querySelector(`input[data-qidx="${i}"]`);
                answers.push(input ? input.value : "");
            }
        }
        return answers;
    }

    function showResult() {
        const answers = collectAnswers();
        let totalScore = 0, maxScore = 0;
        let levelData = null;
        let strengths = [], weaknesses = [];

        if (userAge >= 7 && userAge <= 12) {
            const { totalScore: ts, maxScore: ms, topicScores } = evaluateChildrenTest(answers, currentTest.questions);
            totalScore = ts; maxScore = ms;
            levelData = getChildrenLevelFromTopics(topicScores);
            const sw = getChildrenStrengthsWeaknesses(topicScores);
            strengths = sw.strengths;
            weaknesses = sw.weaknesses;
        } 
        else if (userAge >= 13 && userAge <= 17) {
            const { totalScore: ts, maxScore: ms, topicScores } = evaluateTeenTest(answers, currentTest.questions);
            totalScore = ts; maxScore = ms;
            levelData = getTeenLevelFromTopics(topicScores, totalScore, maxScore);
            strengths = levelData.strongTopics.map(t => `✅ ${t.replace(/_/g,' ')}`);
            weaknesses = levelData.weakTopics.map(t => `❌ ${t.replace(/_/g,' ')}`);
            if (strengths.length === 0) strengths = ["Пока нет явных сильных сторон"];
            if (weaknesses.length === 0) weaknesses = ["Отлично! Можно переходить на следующий уровень"];
        }

        const resultDiv = document.getElementById("resultContent");
        resultDiv.innerHTML = `
            <div class="result-card">
                <div class="badge">${userName}, ваш уровень</div>
                <h3>${levelData.level}</h3>
                <p><strong>Баллы:</strong> ${totalScore} из ${maxScore}</p>
                <h4>📖 Рекомендуемый УМК:</h4>
                <p>${levelData.umk}</p>
                <div class="success-list">
                    <h4>✅ Что получилось:</h4>
                    <ul>${strengths.map(s => `<li>${s}</li>`).join('')}</ul>
                </div>
                <div class="warning">
                    <h4>📌 Что нужно подтянуть:</h4>
                    <ul>${weaknesses.map(w => `<li>${w}</li>`).join('')}</ul>
                </div>
                <p><strong>Следующий шаг:</strong> ${levelData.nextLevel}</p>
                <p>❗ Открытые задания не проверялись – оцениваются преподавателем.</p>
            </div>
        `;
        document.getElementById("testScreen").style.display = "none";
        document.getElementById("resultScreen").style.display = "block";
    }

    document.getElementById("startBtn").addEventListener("click", () => {
        userName = document.getElementById("userName").value.trim();
        userAge = parseInt(document.getElementById("userAge").value);
        if (!userName || isNaN(userAge) || userAge < 7 || userAge > 17) {
            alert("Пожалуйста, введите имя и возраст от 7 до 17 лет.");
            return;
        }
        const test = getTestByAge(userAge);
        if (!test) {
            alert("Тест для этого возраста не найден.");
            return;
        }
        currentTest = test;
        renderTest();
    });

    document.getElementById("submitTestBtn").addEventListener("click", showResult);
    document.getElementById("restartBtn").addEventListener("click", () => {
        document.getElementById("resultScreen").style.display = "none";
        document.getElementById("entryScreen").style.display = "block";
        currentTest = null;
    });
</script>
